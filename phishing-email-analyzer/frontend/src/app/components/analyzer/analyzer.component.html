<p-card styleClass="mb-8 analyzer-card">
  <div class="analyzer-form">
    <div class="field">
      <label for="model-select">Select AI Model</label>
      <p-select
        inputId="model-select"
        data-testid="model-select"
        [options]="models"
        optionLabel="name"
        optionValue="id"
        [(ngModel)]="selectedModel"
        [disabled]="loading()"
        appendTo="body"
        fluid
      />
    </div>

    <div class="field">
      <label for="sender-input">Sender Email</label>
      <input
        id="sender-input"
        data-testid="sender-input"
        pInputText
        type="text"
        [(ngModel)]="sender"
        [disabled]="loading()"
        placeholder="e.g. attacker@example.com"
      />
    </div>

    <div class="field">
      <label for="title-input">Email Title/Subject</label>
      <input
        id="title-input"
        data-testid="title-input"
        pInputText
        type="text"
        [(ngModel)]="title"
        [disabled]="loading()"
        placeholder="e.g. Urgent: Verify Your Account"
      />
    </div>

    <div class="field">
      <label for="email-input">Email content</label>
      <textarea
        id="email-input"
        data-testid="email-input"
        pTextarea
        aria-label="Email content"
        [(ngModel)]="emailText"
        [disabled]="loading()"
        placeholder="Paste email content here..."
        rows="10"
      ></textarea>
      <small class="char-counter">{{ emailText().length }} characters</small>
    </div>

    <div class="action-row">
      <button
        data-testid="analyze-button"
        pButton
        type="button"
        label="Analyze"
        icon="pi pi-search"
        [loading]="loading()"
        [disabled]="loading() || !emailText().trim()"
        (click)="onAnalyze()"
      ></button>
      <button
        data-testid="clear-button"
        pButton
        type="button"
        label="Clear"
        icon="pi pi-trash"
        severity="secondary"
        [disabled]="loading()"
        (click)="clear()"
      ></button>
    </div>

    @if (externalError()) {
      <p-message severity="error">{{ externalError() }}</p-message>
    }
  </div>
</p-card>
