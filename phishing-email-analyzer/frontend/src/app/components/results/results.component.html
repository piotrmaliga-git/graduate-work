@if (result(); as res) {
  <div class="pt-8 mt-8 border-t-2 border-gray-400">
    <h2 class="mb-5 text-2xl font-semibold text-gray-900">Analysis Result</h2>
    <div
      class="p-5 mb-8 border-l-4 rounded bg-gradient-to-r from-blue-50 to-gray-100 border-primary"
    >
      <div class="flex justify-between py-3 border-b border-gray-300">
        <span class="font-semibold text-gray-700">Model:</span>
        <span class="font-medium text-gray-900">{{ res.model }}</span>
      </div>
      <div class="flex justify-between py-3 border-b border-gray-300">
        <span class="font-semibold text-gray-700">Sender:</span>
        <span class="font-medium text-gray-900">{{ res.sender }}</span>
      </div>
      <div class="flex justify-between py-3 border-b border-gray-300">
        <span class="font-semibold text-gray-700">Title:</span>
        <span class="font-medium text-gray-900">{{ res.title }}</span>
      </div>
      <div class="flex justify-between py-3 border-b border-gray-300">
        <span class="font-semibold text-gray-700">Prediction:</span>
        <span
          class="px-2 py-1 font-bold rounded"
          [ngClass]="
            res.prediction === 'phishing' ? 'text-danger bg-red-100' : 'text-success bg-green-100'
          "
        >
          {{ res.prediction | uppercase }}
        </span>
      </div>
      <div class="pt-3 pb-6 border-b border-gray-300">
        <span class="block mb-3 font-semibold text-gray-700">Detailed Analysis:</span>
        <div
          class="p-4 text-sm leading-relaxed text-gray-800 bg-white rounded-lg shadow-sm"
          [innerHTML]="res.reason | formatReason"
        ></div>
      </div>
      <div class="flex justify-between py-3 border-b border-gray-300">
        <span class="font-semibold text-gray-700">Response Time:</span>
        <span class="font-medium text-gray-900">{{ res.response_time_ms | formatTime }}</span>
      </div>
      <div class="flex justify-between py-3">
        <span class="font-semibold text-gray-700">Timestamp:</span>
        <span class="font-medium text-gray-900">{{ res.timestamp | date: 'short' }}</span>
      </div>
    </div>
  </div>
}
